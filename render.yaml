services:
  - type: web
    name: irving-mvp
    runtime: python
    buildCommand: pip install -r requirements-irving-mvp.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker irving_mvp_server:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_REVIEW_QUEUE_DB_ID
        sync: false
      - key: NOTION_CONTEXT_SNAPSHOTS_DB_ID
        sync: false
      - key: IRVING_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DRIVE_OUTPUT_FOLDER_ID
        sync: false
