name: Keep Cloud Run Service Warm

on:
  schedule:
    # Runs every 5 minutes to reduce Cloud Run scale-to-zero cold starts.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Irving MVP health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://irving-mvp-651998378461.us-central1.run.app/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
            exit 1
          fi
